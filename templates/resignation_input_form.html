{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-white">
                    <h4 class="mb-0">{{ doc_type|replace('_', ' ')|title }} – Resignation Date Required</h4>
                </div>
                <div class="card-body">
                    <p>This employee does not have a resignation date on record. Please enter the details to proceed.</p>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Resignation Date *</label>
                            <input type="date" name="resignation_date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Relieving Date (optional)</label>
                            <input type="date" name="relieving_date" class="form-control">
                            <small class="text-muted">If not provided, will be 30 days after resignation.</small>
                        </div>
                        <button type="submit" class="btn btn-primary">Save & Continue</button>
                        <a href="{{ url_for('admin_dashboard', tab='document_generator', member_id=employee.id, member_type='employee') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
