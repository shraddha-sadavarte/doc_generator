{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                    <h4 class="mb-0">
                        <i class="fas fa-building me-2"></i>Select Company
                    </h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-center mb-4">
                        Generating <strong>{{ doc_type.replace('_', ' ')|title }}</strong> for<br>
                        {{ employee.full_name }} ({{ employee.employee_id }})
                    </p>

                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Choose a company</label>
                            <select class="form-select" name="company_id" required>
                                <option value="">-- Select Company --</option>
                                {% for company in companies %}
                                <option value="{{ company.id }}">{{ company.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                                <i class="fas fa-arrow-right me-2"></i>Continue to Preview
                            </button>
                            <a href="{{ url_for('view_employee', emp_id=employee.id) }}" class="btn btn-outline-secondary rounded-pill">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
